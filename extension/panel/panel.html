<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KyleOS</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <span class="logo">KyleOS</span>
        <span id="mode-badge" class="mode-badge">–</span>
      </div>
      <div class="header-right">
        <button id="btn-analyze" class="btn btn-primary" title="Analyze this page">Analyze</button>
        <button id="btn-settings" class="btn btn-ghost" title="Settings">⚙</button>
      </div>
    </header>

    <!-- Status bar -->
    <div id="status-bar" class="status-bar hidden">
      <span id="status-text"></span>
    </div>

    <!-- Platform info -->
    <div id="platform-bar" class="platform-bar">
      <span id="platform-label">Detecting page…</span>
    </div>

    <!-- Main output area -->
    <div id="output-area" class="output-area">
      <div id="welcome" class="welcome-msg">
        <p>Open Agent Tools, MLS, OneHome, or Gmail.</p>
        <p>KyleOS will detect the page and offer analysis options.</p>
      </div>
    </div>

    <!-- Approval gate -->
    <div id="approval-gate" class="approval-gate hidden">
      <div class="approval-content">
        <div id="approval-message" class="approval-message"></div>
        <div class="approval-actions">
          <button id="btn-approve" class="btn btn-success">Approve</button>
          <button id="btn-reject" class="btn btn-danger">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Settings panel -->
    <div id="settings-panel" class="settings-panel hidden">
      <h3>Settings</h3>
      <div class="setting-row">
        <label>Agent Name</label>
        <input id="setting-agent-name" type="text" placeholder="Kyle Kleinman" />
      </div>
      <div class="setting-row">
        <label>Brokerage</label>
        <input id="setting-brokerage" type="text" placeholder="Redfin" />
      </div>
      <div class="setting-row">
        <label>Market</label>
        <input id="setting-market" type="text" placeholder="Miami, FL" />
      </div>
      <div class="setting-row">
        <label>API Key (Brain)</label>
        <input id="setting-api-key" type="password" placeholder="sk-…" />
      </div>
      <button id="btn-save-settings" class="btn btn-primary">Save</button>
      <button id="btn-close-settings" class="btn btn-ghost">Close</button>
    </div>
  </div>

  <script src="panel.js"></script>
</body>
</html>
